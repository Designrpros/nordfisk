site_name: NordFISK
site_description: Komplett fiskeguide for Norge - spots, arter, utstyr og guider
site_author: NordFISK
site_url: https://designrpros.github.io/nordfisk/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep blue
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Hjem: index.md
  - Nord-Norge:
    - Oversikt: nord/index.md
    - Lofoten: nord/lofoten.md
    - Tromsø: nord/troms.md
    - Vesterålen: nord/vesteralen.md
    - Finnmark: nord/finnmark.md
    - Nordkapp: nord/nordkapp.md
  - Midt-Norge:
    - Oversikt: midt/index.md
    - Trondheim: midt/trondheim.md
    - Mjøsa: midt/mjos.md
    - Romsdalen: midt/romsdal.md
    - Kristiansund: midt/kristiansund.md
    - Molde: midt/molde.md
  - Sørlandet:
    - Oversikt: sor/index.md
    - Kristiansand: sor/kristiansand.md
    - Arendal: sor/arendal.md
    - Mandal: sor/mandal.md
    - Rogaland: sor/rogaland.md
    - Lister: sor/lister.md
  - Østlandet:
    - Oversikt: ost/index.md
    - Oslofjorden: ost/oslofjord.md
    - Drammen: ost/drammen.md
  - Vestlandet:
    - Oversikt: vest/index.md
    - Bergen: vest/bergen.md
    - Stavanger: vest/stavanger.md
    - Hardanger: vest/hardanger.md
    - Flåm: vest/flam.md
  - Svalbard:
    - Oversikt: svalbard/index.md
    - Longyearbyen: svalbard/longyearbyen.md
  - Arter:
    - Alle arter: arter/index.md
    - Torsk: arter/torsk.md
    - Laks: arter/laks.md
    - Kveite: arter/kveite.md
    - Ørret: arter/orret.md
    - Sei: arter/sei.md
  - Guider:
    - Nybyrjar: guides/nybyrjar.md
  - Utstyr: utstyr/index.md
  - Blogg: blog/index.md
